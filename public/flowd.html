<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Invensis LMS — Page Flow (Stage 2–6)</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root{
    --bg:#f8fafc;
    --panel:#ffffff;
    --ink:#0f1133;
    --muted:#6b7196;
    --border:#e5e7eb;
    --line:#cbd5e1;
    --auth:#2563eb;
    --onboarding:#7c3aed;
    --dashboard:#0f1133;
    --content:#0d9488;
    --ai:#d97706;
    --support:#db2777;
    --readiness:#16a34a;
    --voucher:#b45309;
    --bronze:#a16207;
    --silver:#64748b;
    --gold:#d97706;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);overflow:hidden}

  header.toolbar{
    position:fixed;top:0;left:0;right:0;z-index:10;
    background:var(--panel);border-bottom:1px solid var(--border);
    padding:10px 18px;display:flex;align-items:center;gap:18px;flex-wrap:wrap
  }
  header.toolbar h1{margin:0;font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px}
  header.toolbar h1 .dot{width:10px;height:10px;border-radius:50%;background:var(--readiness)}
  header.toolbar .stats{font-size:12px;color:var(--muted);display:flex;gap:14px}
  header.toolbar .stats strong{color:var(--ink)}
  header.toolbar .legend{display:flex;gap:10px;flex-wrap:wrap;font-size:11px}
  header.toolbar .legend span{display:inline-flex;align-items:center;gap:5px;color:var(--muted)}
  header.toolbar .legend i{width:11px;height:11px;border-radius:3px;background:var(--auth);display:inline-block}
  header.toolbar .legend .auth i{background:var(--auth)}
  header.toolbar .legend .onboarding i{background:var(--onboarding)}
  header.toolbar .legend .dashboard i{background:var(--dashboard)}
  header.toolbar .legend .content i{background:var(--content)}
  header.toolbar .legend .ai i{background:var(--ai)}
  header.toolbar .legend .support i{background:var(--support)}
  header.toolbar .legend .readiness i{background:var(--readiness)}
  header.toolbar .legend .voucher i{background:var(--voucher)}

  .controls{margin-left:auto;display:flex;gap:6px}
  .controls button{
    background:#fff;border:1px solid var(--border);color:var(--ink);
    padding:6px 11px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer
  }
  .controls button:hover{background:#f1f5f9;border-color:var(--line)}

  #canvas-wrap{
    position:absolute;top:48px;left:0;right:0;bottom:28px;
    overflow:hidden;cursor:grab;background:
      radial-gradient(circle at 1px 1px, #d8dde7 1px, transparent 0);
    background-size:24px 24px;background-color:var(--bg)
  }
  #canvas-wrap.dragging{cursor:grabbing}

  svg#flow{display:block;transform-origin:0 0}

  /* Stage lane headers */
  .lane-label{font-size:12px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;fill:var(--muted)}
  .lane-bg{fill:#eef2f8;opacity:.4}

  /* Node card */
  .node{cursor:pointer;transition:transform .12s ease}
  .node:hover{transform:translateY(-2px)}
  .node rect.card{
    fill:#fff;stroke:var(--border);stroke-width:1;rx:10;
    filter:drop-shadow(0 2px 4px rgba(15,17,51,.06))
  }
  .node:hover rect.card{stroke-width:2}
  .node .stripe{rx:0}
  .node .stripe.auth{fill:var(--auth)}
  .node .stripe.onboarding{fill:var(--onboarding)}
  .node .stripe.dashboard{fill:var(--dashboard)}
  .node .stripe.content{fill:var(--content)}
  .node .stripe.ai{fill:var(--ai)}
  .node .stripe.support{fill:var(--support)}
  .node .stripe.readiness{fill:var(--readiness)}
  .node .stripe.voucher{fill:var(--voucher)}
  .node:hover rect.card.auth{stroke:var(--auth)}
  .node:hover rect.card.onboarding{stroke:var(--onboarding)}
  .node:hover rect.card.dashboard{stroke:var(--dashboard)}
  .node:hover rect.card.content{stroke:var(--content)}
  .node:hover rect.card.ai{stroke:var(--ai)}
  .node:hover rect.card.support{stroke:var(--support)}
  .node:hover rect.card.readiness{stroke:var(--readiness)}
  .node:hover rect.card.voucher{stroke:var(--voucher)}
  .node .label{font-size:13px;font-weight:700;fill:var(--ink)}
  .node .route{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10px;fill:var(--muted)}
  .node .task{font-size:9.5px;font-weight:800;fill:#fff;letter-spacing:.4px}
  .node .task-bg{fill:var(--muted);opacity:.85}
  .node .tier-badge{font-size:9px;font-weight:800;letter-spacing:.4px;text-transform:uppercase}
  .tier-bg.bronze{fill:#fef3c7}
  .tier-bg.silver{fill:#e2e8f0}
  .tier-bg.gold{fill:#fef3c7;stroke:#d97706;stroke-width:1}
  .tier-text.bronze{fill:#92400e}
  .tier-text.silver{fill:#475569}
  .tier-text.gold{fill:#92400e}

  /* Edges */
  .edge{fill:none;stroke:var(--line);stroke-width:1.5;opacity:.65}
  .edge.conditional{stroke-dasharray:5 4;opacity:.85;stroke:#94a3b8}
  .edge-label{font-size:10px;fill:var(--muted);font-weight:600}
  .edge-label-bg{fill:#fff;opacity:.85}

  /* Highlight on hover */
  .node.hovered rect.card{stroke-width:2.5}
  .edge.dim{opacity:.1}
  .edge.highlighted{opacity:1;stroke:#0f1133;stroke-width:2.5}
  .node.dim{opacity:.25}

  footer.status{
    position:fixed;bottom:0;left:0;right:0;height:28px;
    background:var(--panel);border-top:1px solid var(--border);
    padding:0 18px;display:flex;align-items:center;justify-content:space-between;
    font-size:11px;color:var(--muted)
  }
  footer kbd{
    background:#f1f5f9;border:1px solid var(--border);border-bottom-width:2px;
    border-radius:4px;padding:0 5px;font-size:10px;font-family:ui-monospace,monospace;
    color:var(--ink)
  }

  /* Tooltip */
  #tip{
    position:fixed;background:#0f1133;color:#fff;padding:8px 12px;border-radius:8px;
    font-size:12px;pointer-events:none;z-index:50;display:none;max-width:280px;
    box-shadow:0 8px 20px rgba(0,0,0,.25);line-height:1.4
  }
  #tip .tip-label{font-weight:800;margin-bottom:3px}
  #tip .tip-route{font-family:ui-monospace,monospace;font-size:10.5px;color:#cbd5e1}
  #tip .tip-hint{font-size:10.5px;color:#94a3b8;margin-top:4px;border-top:1px solid #1e2042;padding-top:4px}
</style>
</head>
<body>

<header class="toolbar">
  <h1><span class="dot"></span> Invensis LMS — Page Flow</h1>
  <div class="stats">

    <span class="support"><i></i>Support</span>
    <span class="readiness"><i></i>Readiness</span>
    <span class="voucher"><i></i>Voucher</span>
  </div>
  <div class="controls">

    <button id="btn-zoom-in">+</button>
    <button id="btn-zoom-out">−</button>
    <button id="btn-reset">Reset</button>

</header>

<div id="canvas-wrap">

    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#94a3b8"/>
      </marker>
      <marker id="arrow-dark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
        <path d="M 0 0 L 10 5 L 0 10 z" fill="#0f1133"/>
      </marker>
    </defs>
    <g id="lanes"></g>
    <g id="edges"></g>
    <g id="nodes"></g>
  </svg>
</div>

<div id="tip"></div>

<footer class="status">
  <span>
    Click any page to open it · Hover a page to highlight its connections
  </span>
  <span>
    Drag to pan · Scroll to zoom · <kbd>R</kbd> to reset
  </span>
</footer>

  { from: "voucher-booking", to: "voucher-scheduled", trigger: "Record exam date" },
  { from: "voucher-scheduled", to: "lms-dashboard",   trigger: "Back" },
  { from: "voucher-combo",   to: "voucher-booking",   trigger: "Redeem F or P" },
];

/* ─── Render ───────────────────────────────────────────────── */

// Compute positions
NODES.forEach(n => {
  n.x = STAGES[n.stage].x;
  n.y = slot(n.slot);
});

// Canvas bounds with padding
const allX = NODES.map(n => n.x);
const allY = NODES.map(n => n.y);
const minX = Math.min(...allX) - 60;
const minY = Math.min(...allY) - 40;
const maxX = Math.max(...allX) + NODE_W + 60;
const maxY = Math.max(...allY) + NODE_H + 80;
const CANVAS_W = maxX - minX;
const CANVAS_H = maxY - minY;

const svg = document.getElementById("flow");
svg.setAttribute("width", CANVAS_W);
svg.setAttribute("height", CANVAS_H);
svg.setAttribute("viewBox", `${minX} ${minY} ${CANVAS_W} ${CANVAS_H}`);

// Draw lane backgrounds + labels
const lanes = document.getElementById("lanes");
Object.entries(STAGES).forEach(([stage, info]) => {
  const stageNodes = NODES.filter(n => n.stage === stage);
  if (stageNodes.length === 0) return;
  const top = Math.min(...stageNodes.map(n => n.y)) - 20;
  const bottom = Math.max(...stageNodes.map(n => n.y)) + NODE_H + 20;
  const left = info.x - 16;
  const right = info.x + NODE_W + 16;

  const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
  rect.setAttribute("x", left);
  rect.setAttribute("y", top);
  rect.setAttribute("width", right - left);
  rect.setAttribute("height", bottom - top);
  rect.setAttribute("class", "lane-bg");
  rect.setAttribute("rx", 14);
  lanes.appendChild(rect);

  const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
  label.setAttribute("x", info.x + NODE_W / 2);
  label.setAttribute("y", top - 8);
  label.setAttribute("text-anchor", "middle");
  label.setAttribute("class", "lane-label");
  label.textContent = info.label;
  lanes.appendChild(label);
});

// Draw edges as bezier curves
const edgesG = document.getElementById("edges");
const edgePaths = [];
EDGES.forEach((e, idx) => {
  const from = NODES.find(n => n.id === e.from);
  const to = NODES.find(n => n.id === e.to);
  if (!from || !to) { console.warn("Missing node for edge:", e); return; }

  const sameColumn = from.x === to.x;
  let path;
  if (sameColumn) {
    // Loop back through left side of column
    const x1 = from.x; // left edge
    const y1 = from.y + NODE_H / 2;
    const x2 = to.x;   // left edge
    const y2 = to.y + NODE_H / 2;
    const cx = x1 - 90;
    path = `M ${x1} ${y1} C ${cx} ${y1}, ${cx} ${y2}, ${x2} ${y2}`;
  } else if (to.x > from.x) {
    // Forward edge: right of source → left of target
    const x1 = from.x + NODE_W;
    const y1 = from.y + NODE_H / 2;
    const x2 = to.x;
    const y2 = to.y + NODE_H / 2;
    const dx = (x2 - x1) * 0.4;
    path = `M ${x1} ${y1} C ${x1 + dx} ${y1}, ${x2 - dx} ${y2}, ${x2} ${y2}`;
  } else {
    // Backward edge: bend below
    const x1 = from.x;
    const y1 = from.y + NODE_H;
    const x2 = to.x + NODE_W;
    const y2 = to.y + NODE_H;
    const mid = (y1 + y2) / 2 + 60;
    path = `M ${x1} ${y1} C ${x1 - 80} ${mid}, ${x2 + 80} ${mid}, ${x2} ${y2}`;
  }

  const pathEl = document.createElementNS("http://www.w3.org/2000/svg", "path");
  pathEl.setAttribute("d", path);
  pathEl.setAttribute("class", "edge" + (e.conditional ? " conditional" : ""));
  pathEl.setAttribute("marker-end", "url(#arrow)");
  pathEl.dataset.from = e.from;
  pathEl.dataset.to = e.to;
  edgesG.appendChild(pathEl);
  edgePaths.push(pathEl);
});

// Draw nodes
const nodesG = document.getElementById("nodes");
NODES.forEach(n => {
  const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
  g.setAttribute("class", "node");
  g.setAttribute("transform", `translate(${n.x}, ${n.y})`);
  g.dataset.id = n.id;

  // Card
  const card = document.createElementNS("http://www.w3.org/2000/svg", "rect");
  card.setAttribute("class", "card " + n.stage);
  card.setAttribute("width", NODE_W);
  card.setAttribute("height", NODE_H);
  card.setAttribute("rx", 10);
  g.appendChild(card);

  // Left stripe
  const stripe = document.createElementNS("http://www.w3.org/2000/svg", "rect");
  stripe.setAttribute("class", "stripe " + n.stage);
  stripe.setAttribute("width", 5);
  stripe.setAttribute("height", NODE_H);
  stripe.setAttribute("x", 0);
  stripe.setAttribute("y", 0);
  g.appendChild(stripe);

  // Label
  const label = document.createElementNS("http://www.w3.org/2000/svg", "text");
  label.setAttribute("class", "label");
  label.setAttribute("x", 16);
  label.setAttribute("y", 26);
  label.textContent = n.label;
  g.appendChild(label);

  // Route
  const route = document.createElementNS("http://www.w3.org/2000/svg", "text");
  route.setAttribute("class", "route");
  route.setAttribute("x", 16);
  route.setAttribute("y", 46);
  route.textContent = n.route.length > 32 ? n.route.slice(0, 30) + "…" : n.route;
  g.appendChild(route);

  // Task badge
  if (n.task) {
    const taskBg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    taskBg.setAttribute("class", "task-bg");
    taskBg.setAttribute("x", 16);
    taskBg.setAttribute("y", NODE_H - 24);
    taskBg.setAttribute("width", 36);
    taskBg.setAttribute("height", 14);
    taskBg.setAttribute("rx", 4);
    g.appendChild(taskBg);

    const taskText = document.createElementNS("http://www.w3.org/2000/svg", "text");
    taskText.setAttribute("class", "task");
    taskText.setAttribute("x", 34);
    taskText.setAttribute("y", NODE_H - 14);
    taskText.setAttribute("text-anchor", "middle");
    taskText.textContent = "T" + n.task;
    g.appendChild(taskText);
  }

  // Tier badge
  if (n.tier) {
    const tierBg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
    tierBg.setAttribute("class", "tier-bg " + n.tier);
    tierBg.setAttribute("x", NODE_W - 56);
    tierBg.setAttribute("y", NODE_H - 24);
    tierBg.setAttribute("width", 40);
    tierBg.setAttribute("height", 14);
    tierBg.setAttribute("rx", 4);
    g.appendChild(tierBg);

    const tierText = document.createElementNS("http://www.w3.org/2000/svg", "text");
    tierText.setAttribute("class", "tier-badge tier-text " + n.tier);
    tierText.setAttribute("x", NODE_W - 36);
    tierText.setAttribute("y", NODE_H - 14);
    tierText.setAttribute("text-anchor", "middle");
    tierText.textContent = n.tier.toUpperCase();
    g.appendChild(tierText);
  }

  // Click → open page
  g.addEventListener("click", (ev) => {
    ev.stopPropagation();
    window.open(DEV_HOST + n.route, "_blank");
  });

  // Hover → highlight connected edges
  g.addEventListener("mouseenter", () => {
    edgePaths.forEach(p => {
      if (p.dataset.from === n.id || p.dataset.to === n.id) {
        p.classList.add("highlighted");
        p.setAttribute("marker-end", "url(#arrow-dark)");
      } else {
        p.classList.add("dim");
      }
    });
    const connected = new Set([n.id]);
    edgePaths.forEach(p => {
      if (p.dataset.from === n.id) connected.add(p.dataset.to);
      if (p.dataset.to === n.id) connected.add(p.dataset.from);
    });
    document.querySelectorAll(".node").forEach(el => {
      if (!connected.has(el.dataset.id)) el.classList.add("dim");
    });
    showTip(ev, n);
  });
  g.addEventListener("mouseleave", () => {
    edgePaths.forEach(p => {
      p.classList.remove("highlighted", "dim");
      p.setAttribute("marker-end", "url(#arrow)");
    });
    document.querySelectorAll(".node").forEach(el => el.classList.remove("dim"));
    hideTip();
  });
  g.addEventListener("mousemove", (ev) => moveTip(ev));

  nodesG.appendChild(g);
});

// Stats
document.getElementById("stat-nodes").textContent = NODES.length;
document.getElementById("stat-edges").textContent = EDGES.length;

/* ─── Tooltip ──────────────────────────────────────────────── */
const tip = document.getElementById("tip");
function showTip(ev, n) {
  tip.innerHTML = `
    <div class="tip-label">${n.label}</div>
    <div class="tip-route">${n.route}</div>
    <div class="tip-hint">Click to open · Task ${n.task ?? "—"}${n.tier ? " · " + n.tier.toUpperCase() + " tier" : ""}</div>
  `;
  tip.style.display = "block";
  moveTip(ev);
}
function moveTip(ev) {
  const pad = 14;
  tip.style.left = (ev.clientX + pad) + "px";
  tip.style.top = (ev.clientY + pad) + "px";
}
function hideTip() { tip.style.display = "none"; }

/* ─── Pan & zoom ───────────────────────────────────────────── */
const wrap = document.getElementById("canvas-wrap");
let scale = 1, tx = 0, ty = 0;

function applyTransform() {
  svg.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
}

function fitToScreen() {
  const wrapRect = wrap.getBoundingClientRect();
  const sx = wrapRect.width / CANVAS_W;
  const sy = wrapRect.height / CANVAS_H;
  scale = Math.min(sx, sy) * 0.95;
  tx = (wrapRect.width - CANVAS_W * scale) / 2;
  ty = (wrapRect.height - CANVAS_H * scale) / 2;
  applyTransform();
}

wrap.addEventListener("wheel", (ev) => {
  ev.preventDefault();
  const delta = ev.deltaY > 0 ? 0.9 : 1.1;
  const rect = wrap.getBoundingClientRect();
  const px = ev.clientX - rect.left;
  const py = ev.clientY - rect.top;
  const newScale = Math.max(0.2, Math.min(3, scale * delta));
  // Zoom around cursor
  tx = px - (px - tx) * (newScale / scale);
  ty = py - (py - ty) * (newScale / scale);
  scale = newScale;
  applyTransform();
}, { passive: false });

let panning = false, panStartX = 0, panStartY = 0, panOrigX = 0, panOrigY = 0;
wrap.addEventListener("mousedown", (ev) => {
  if (ev.target.closest(".node")) return;
  panning = true;
  panStartX = ev.clientX;
  panStartY = ev.clientY;
  panOrigX = tx;
  panOrigY = ty;
  wrap.classList.add("dragging");
});
window.addEventListener("mousemove", (ev) => {
  if (!panning) return;
  tx = panOrigX + (ev.clientX - panStartX);
  ty = panOrigY + (ev.clientY - panStartY);
  applyTransform();
});
window.addEventListener("mouseup", () => {
  panning = false;
  wrap.classList.remove("dragging");
});

document.getElementById("btn-fit").addEventListener("click", fitToScreen);
document.getElementById("btn-zoom-in").addEventListener("click", () => { scale *= 1.2; applyTransform(); });
document.getElementById("btn-zoom-out").addEventListener("click", () => { scale /= 1.2; applyTransform(); });
document.getElementById("btn-reset").addEventListener("click", fitToScreen);
window.addEventListener("keydown", (ev) => {
  if (ev.key === "r" || ev.key === "R") fitToScreen();
});

// Initial fit
fitToScreen();
window.addEventListener("resize", fitToScreen);
</script>
</body>
</html>
