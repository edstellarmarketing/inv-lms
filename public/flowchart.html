<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Invensis LMS — Flowchart with Explanations</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root{
    --bg:#f8fafc;
    --panel:#ffffff;
    --ink:#0f1133;
    --muted:#6b7196;
    --soft:#475569;
    --border:#e5e7eb;
    --line:#cbd5e1;

    --auth:#2563eb; --auth-bg:#dbeafe;
    --onboarding:#7c3aed; --onboarding-bg:#ede9fe;
    --dashboard:#0f1133; --dashboard-bg:#e2e8f0;
    --content:#0d9488; --content-bg:#ccfbf1;
    --ai:#d97706; --ai-bg:#fed7aa;
    --support:#db2777; --support-bg:#fce7f3;
    --readiness:#16a34a; --readiness-bg:#dcfce7;
    --voucher:#b45309; --voucher-bg:#fef3c7;
    --exam:#1e3a8a; --exam-bg:#dbeafe;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);line-height:1.55}
  body{padding:0 0 80px}

  /* Sticky stage nav */
  header.topbar{
    position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid var(--border);
    padding:14px 28px;display:flex;align-items:center;gap:18px;flex-wrap:wrap
  }
  header.topbar h1{margin:0;font-size:16px;font-weight:800;display:flex;align-items:center;gap:8px}
  header.topbar h1::before{content:"";display:inline-block;width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,#16a34a,#2563eb)}
  header.topbar nav{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto}
  header.topbar nav a{
    font-size:11.5px;font-weight:700;text-decoration:none;color:var(--soft);
    padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:#fff
  }
  header.topbar nav a:hover{background:#f1f5f9}

  /* Page wrapper */
  main{max-width:1280px;margin:0 auto;padding:30px 28px}

  /* Stage section */
  section.stage{margin-bottom:46px}
  section.stage > header{
    padding:14px 18px;border-radius:12px;display:flex;align-items:center;gap:14px;
    margin-bottom:18px;border:1px solid var(--border)
  }
  section.stage h2{margin:0;font-size:20px;font-weight:800}
  section.stage > header small{font-size:12.5px;color:var(--muted);font-weight:600}
  section.stage.auth > header{background:var(--auth-bg);border-color:var(--auth);color:var(--auth)}
  section.stage.onboarding > header{background:var(--onboarding-bg);border-color:var(--onboarding);color:var(--onboarding)}
  section.stage.dashboard > header{background:var(--dashboard-bg);border-color:var(--dashboard);color:var(--dashboard)}
  section.stage.content > header{background:var(--content-bg);border-color:var(--content);color:#0f766e}
  section.stage.ai > header{background:var(--ai-bg);border-color:var(--ai);color:#92400e}
  section.stage.support > header{background:var(--support-bg);border-color:var(--support);color:#be185d}
  section.stage.readiness > header{background:var(--readiness-bg);border-color:var(--readiness);color:#15803d}
  section.stage.voucher > header{background:var(--voucher-bg);border-color:var(--voucher);color:#92400e}
  section.stage.exam > header{background:var(--exam-bg);border-color:var(--exam);color:var(--exam)}

  /* Page card */
  article.page{
    background:#fff;border:1px solid var(--border);border-radius:14px;padding:22px 26px;margin-bottom:18px;
    position:relative;overflow:hidden
  }
  article.page::before{content:"";position:absolute;left:0;top:0;bottom:0;width:5px}
  article.page.auth::before{background:var(--auth)}
  article.page.onboarding::before{background:var(--onboarding)}
  article.page.dashboard::before{background:var(--dashboard)}
  article.page.content::before{background:var(--content)}
  article.page.ai::before{background:var(--ai)}
  article.page.support::before{background:var(--support)}
  article.page.readiness::before{background:var(--readiness)}
  article.page.voucher::before{background:var(--voucher)}
  article.page.exam::before{background:var(--exam)}

  article.page > header.page-head{
    display:flex;justify-content:space-between;align-items:flex-start;gap:18px;flex-wrap:wrap;
    margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)
  }
  article.page h3{margin:0;font-size:17px;font-weight:800;display:flex;align-items:center;gap:10px}
  article.page h3 .icon{font-size:18px}
  article.page .meta{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  article.page .meta a{
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:var(--auth);
    background:#eff6ff;padding:4px 10px;border-radius:6px;text-decoration:none;font-weight:700
  }
  article.page .meta a:hover{background:#dbeafe;text-decoration:underline}
  article.page .task-pill{background:#0f1133;color:#fff;font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:5px;letter-spacing:.4px}
  article.page .tier-pill{font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:5px;text-transform:uppercase;letter-spacing:.4px}
  article.page .tier-pill.bronze{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
  article.page .tier-pill.silver{background:#e2e8f0;color:#475569;border:1px solid #cbd5e1}
  article.page .tier-pill.gold{background:#fef3c7;color:#92400e;border:1px solid #d97706}

  article.page p.purpose{margin:0 0 14px;font-size:13.5px;color:var(--soft)}
  article.page p.purpose strong{color:var(--ink)}

  /* If/else flowchart blocks */
  .branches{display:flex;flex-direction:column;gap:14px;margin-top:14px}
  .branch-label{
    font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);
    margin-bottom:6px
  }
  .branch{
    background:#fafbff;border:1px solid var(--border);border-radius:10px;padding:12px 14px
  }
  .branch-action{
    display:flex;align-items:center;gap:9px;font-size:13px;font-weight:700;color:var(--ink);
    margin-bottom:8px
  }
  .branch-action::before{
    content:"▶";color:var(--auth);font-size:13px;flex-shrink:0
  }
  .conditions{display:flex;flex-direction:column;gap:6px;margin-left:22px;border-left:2px dashed var(--line);padding-left:14px}
  .cond{display:flex;align-items:flex-start;gap:9px;font-size:12.5px;line-height:1.6}
  .cond .diamond{
    display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;
    width:18px;height:18px;background:#fff;border:2px solid #d97706;
    transform:rotate(45deg);font-size:0
  }
  .cond .diamond.else{border-color:#94a3b8}
  .cond .diamond.success{border-color:#16a34a}
  .cond .test{
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11.5px;
    background:#fef9c3;color:#92400e;padding:1px 7px;border-radius:5px;font-weight:700;white-space:nowrap;border:1px solid #fde68a
  }
  .cond .test.else{background:#f1f5f9;color:#475569;border-color:#cbd5e1}
  .cond .test.success{background:#dcfce7;color:#166534;border-color:#86efac}
  .cond .goto{color:var(--soft);display:flex;align-items:center;gap:5px;flex:1;flex-wrap:wrap}
  .cond .goto::before{content:"→";color:var(--muted);font-weight:800}
  .cond .goto a{
    color:var(--auth);text-decoration:none;font-weight:700;border-bottom:1px dotted var(--auth)
  }
  .cond .goto a:hover{background:#eff6ff}
  .cond .note{color:var(--muted);font-size:11.5px;font-style:italic}

  /* Single (non-conditional) outcome — no diamond */
  .out-row{
    display:flex;align-items:center;gap:9px;font-size:12.5px;color:var(--soft);
    padding:4px 0
  }
  .out-row::before{content:"→";color:var(--muted);font-weight:800;flex-shrink:0}
  .out-row a{color:var(--auth);text-decoration:none;font-weight:700;border-bottom:1px dotted var(--auth)}

  /* Inbound (where users come from) */
  .inbound{
    background:#f8fafc;border-radius:8px;padding:8px 12px;margin-bottom:14px;
    font-size:12px;color:var(--muted)
  }
  .inbound strong{color:var(--ink);font-weight:800;margin-right:6px}
  .inbound a{color:var(--auth);text-decoration:none;font-weight:700}
  .inbound a:hover{text-decoration:underline}

  footer.status{
    position:fixed;bottom:0;left:0;right:0;height:36px;background:#fff;border-top:1px solid var(--border);
    padding:0 28px;display:flex;align-items:center;justify-content:space-between;font-size:11.5px;color:var(--muted)
  }
  footer.status a{color:var(--auth);text-decoration:none;font-weight:700}

  /* Anchor offset for sticky header */
  section.stage{scroll-margin-top:80px}

  @media (max-width:760px){
    main{padding:20px 16px}
    article.page{padding:18px}
    header.topbar nav{display:none}
  }
</style>
</head>
<body>

<header class="topbar">
  <h1>Invensis LMS — Flowchart</h1>
  <nav>
    <a href="#auth">Auth</a>
    <a href="#onboarding">Onboarding</a>
    <a href="#dashboard">Dashboard</a>
    <a href="#content">Content</a>
    <a href="#ai">AI</a>
    <a href="#support">Support</a>
    <a href="#readiness">Readiness</a>
    <a href="#voucher">Voucher</a>
    <a href="#exam">Exam</a>
  </nav>
</header>

<main id="root"></main>

<footer class="status">
  <span>65 pages · 9 stages · click any route to open it</span>
  <span><a href="/flowd.html">← back to visual flow diagram</a></span>
</footer>

<script>
const HOST = "https://inv-lms.vercel.app";

const STAGES = [
  { id: "auth", icon: "🔐", label: "Stage 2 — Authentication", sub: "Activation, login, and password recovery side flows" },
  { id: "onboarding", icon: "🚀", label: "Stage 2 — Onboarding", sub: "4-step setup before the LMS dashboard unlocks" },
  { id: "dashboard", icon: "📊", label: "Dashboards", sub: "Top-level, per-course, progress, and tier/combo variants" },
  { id: "content", icon: "📚", label: "Stage 3 — Course content", sub: "Reference cards, study guides, Q-bank, mock exams" },
  { id: "ai", icon: "🤖", label: "Stage 4 — AI tools", sub: "Personalised study + coaching layer (Silver+)" },
  { id: "support", icon: "🤝", label: "Stage 5 — Support & mentoring", sub: "Live sessions, coaching, support, community, money-back" },
  { id: "readiness", icon: "🎯", label: "Stage 6 — Readiness", sub: "Composite score + per-input drill-downs" },
  { id: "voucher", icon: "🎟️", label: "Stage 6 — Voucher & booking", sub: "Tile states, reveal, awarding-body handoff, scheduled" },
  { id: "exam", icon: "🏁", label: "Stage 7 — Exam day & outcomes", sub: "Exam day prep · standby · outcome · pass and fail paths · terminal" },
];

/**
 * Page schema:
 *   id, route, label, task, tier?, stage
 *   purpose      — what the page does (HTML allowed)
 *   inbound      — array of { from, label, trigger }
 *   branches     — array of { action, conditions: [{ type, test, goto, gotoLabel, note }] }
 *                  type is "if" | "else" | "success" | "plain"
 */

const PAGES = [
  /* ── AUTH ─────────────────────────────────────────────────── */
  {
    id:"activate", stage:"auth", task:1, label:"Activation landing", route:"/activate/abc",
    purpose:"Hero card showing the learner's course and tier, with one CTA. Reached from the activation email link.",
    inbound:[{ label:"Activation email link" }],
    branches:[
      { action:"User clicks 'Set my password'",
        conditions:[ { type:"plain", goto:"set-password", gotoLabel:"Set password + T&C" } ] },
      { action:"On page load",
        conditions:[
          { type:"if", test:"token expired", goto:null, gotoLabel:"Show expired-token fallback", note:"triggers fresh activation email" },
          { type:"else", goto:null, gotoLabel:"Render hero normally" },
        ] },
    ]
  },
  {
    id:"set-password", stage:"auth", task:2, label:"Set password + T&C", route:"/auth/activate",
    purpose:"Email locked, new password + confirm with strength hints, T&C checkbox. Mints the session on submit.",
    inbound:[{ from:"activate", label:"From activation landing" }],
    branches:[
      { action:"User submits the form",
        conditions:[
          { type:"if", test:"enrolments.length === 1", goto:"welcome", gotoLabel:"Welcome (single)" },
          { type:"else", test:"enrolments.length > 1", goto:"welcome-multi", gotoLabel:"Welcome (multi)" },
        ] },
      { action:"Validation",
        conditions:[
          { type:"if", test:"password too weak", goto:null, gotoLabel:"Inline error · stay on page" },
          { type:"if", test:"T&C unchecked", goto:null, gotoLabel:"Submit disabled" },
        ] },
    ]
  },
  {
    id:"login", stage:"auth", task:3, label:"Login", route:"/auth/login",
    purpose:"Returning learner enters email + password. Routes by enrolment count.",
    inbound:[{ label:"Logout / direct visit" }, { from:"reset-password", label:"After reset" }],
    branches:[
      { action:"User submits credentials",
        conditions:[
          { type:"if", test:"creds invalid", goto:null, gotoLabel:"Show inline error · stay on page" },
          { type:"if", test:"enrolments.length === 1", goto:"lms-dashboard", gotoLabel:"LMS course dashboard" },
          { type:"else", goto:"dashboard-top", gotoLabel:"Top-level dashboard" },
        ] },
      { action:"User clicks 'Forgot password'",
        conditions:[ { type:"plain", goto:"forgot-password", gotoLabel:"Forgot password" } ] },
    ]
  },
  {
    id:"forgot-password", stage:"auth", task:4, label:"Forgot password", route:"/auth/forgot-password",
    purpose:"Email field + 'Send reset link' CTA. Issues a short-lived reset token.",
    inbound:[{ from:"login", label:"'Forgot password' link" }],
    branches:[
      { action:"User submits email",
        conditions:[
          { type:"plain", goto:"forgot-password-sent", gotoLabel:"Reset link sent confirmation", note:"always confirms regardless of email match — anti-enumeration" }
        ] },
    ]
  },
  {
    id:"forgot-password-sent", stage:"auth", task:5, label:"Reset link sent", route:"/auth/forgot-password/sent",
    purpose:"Static confirmation prompting the learner to check their inbox.",
    inbound:[{ from:"forgot-password", label:"After submitting email" }],
    branches:[
      { action:"User clicks the email link",
        conditions:[ { type:"plain", goto:"reset-password", gotoLabel:"Reset password" } ] },
    ]
  },
  {
    id:"reset-password", stage:"auth", task:6, label:"Reset password", route:"/auth/reset-password/abc",
    purpose:"New password + confirm. Invalidates old sessions on success.",
    inbound:[{ from:"forgot-password-sent", label:"Reset-link click" }],
    branches:[
      { action:"User submits new password",
        conditions:[
          { type:"if", test:"token expired/invalid", goto:null, gotoLabel:"Show error + 'Request new link' CTA" },
          { type:"success", test:"valid", goto:"login", gotoLabel:"Login (with success toast)" },
        ] },
    ]
  },

  /* ── ONBOARDING ───────────────────────────────────────────── */
  {
    id:"welcome", stage:"onboarding", task:7, label:"Welcome (single)", route:"/welcome",
    purpose:"Single-course welcome with a 4-step indicator (Profile → Exam date → Baseline → Done) and a 'Get started' CTA.",
    inbound:[{ from:"set-password", label:"Single-enrol auto-login" }],
    branches:[
      { action:"User clicks 'Get started'",
        conditions:[ { type:"plain", goto:"onb-profile", gotoLabel:"Step 1 — Profile" } ] },
    ]
  },
  {
    id:"welcome-multi", stage:"onboarding", task:8, label:"Welcome (multi)", route:"/welcome-multi",
    purpose:"Variant welcome for learners with multiple enrolments. Pick a course to begin onboarding for.",
    inbound:[{ from:"set-password", label:"Multi-enrol auto-login" }],
    branches:[
      { action:"User picks a course and clicks 'Get started'",
        conditions:[ { type:"plain", goto:"onb-profile", gotoLabel:"Step 1 — Profile (for chosen course)" } ] },
    ]
  },
  {
    id:"onb-profile", stage:"onboarding", task:9, label:"Step 1 — Profile", route:"/onboarding/profile",
    purpose:"Role, years of experience, domain background, weekly study hours, English proficiency. Drives downstream cadence + AI prompts.",
    inbound:[{ from:"welcome", label:"Get started" }, { from:"welcome-multi", label:"Pick course" }],
    branches:[
      { action:"User submits profile",
        conditions:[ { type:"plain", goto:"onb-exam-date", gotoLabel:"Step 2 — Exam date" } ] },
    ]
  },
  {
    id:"onb-exam-date", stage:"onboarding", task:10, label:"Step 2 — Exam date", route:"/onboarding/exam-date",
    purpose:"Date picker + countdown + recommended cadence based on study hours from Step 1.",
    inbound:[{ from:"onb-profile", label:"Next" }],
    branches:[
      { action:"User picks a date",
        conditions:[
          { type:"if", test:"date < 2 weeks away", goto:null, gotoLabel:"Show 'too soon — most learners need 4+ weeks' warning · still allow" },
          { type:"plain", goto:"onb-baseline", gotoLabel:"Step 3 — Baseline mock" }
        ] },
    ]
  },
  {
    id:"onb-baseline", stage:"onboarding", task:11, label:"Step 3 — Baseline mock", route:"/onboarding/baseline",
    purpose:"20-question timed mock to seed the AI gap report. Results displayed broken down by topic cluster.",
    inbound:[{ from:"onb-exam-date", label:"Next" }],
    branches:[
      { action:"User completes the mock",
        conditions:[ { type:"plain", goto:"onb-complete", gotoLabel:"Step 4 — Ready", note:"baseline score persisted to enrollment" } ] },
    ]
  },
  {
    id:"onb-complete", stage:"onboarding", task:12, label:"Step 4 — Ready", route:"/onboarding/complete",
    purpose:"'You're ready' confirmation with a faded dashboard preview behind. Flips enrollment status to 'active'.",
    inbound:[{ from:"onb-baseline", label:"After submitting mock" }],
    branches:[
      { action:"User clicks 'Open my course'",
        conditions:[ { type:"plain", goto:"lms-dashboard", gotoLabel:"LMS course dashboard" } ] },
    ]
  },

  /* ── DASHBOARDS ───────────────────────────────────────────── */
  {
    id:"dashboard-top", stage:"dashboard", task:14, label:"Top-level dashboard", route:"/dashboard",
    purpose:"Multi-enrolment hub. Lists every active course as a card with progress, readiness, and quick links.",
    inbound:[{ from:"login", label:"Login (multi enrol)" }],
    branches:[
      { action:"User picks a course card",
        conditions:[
          { type:"if", test:"enrolment.type === 'combo'", goto:"dashboard-multi", gotoLabel:"Combo dashboard (F+P)" },
          { type:"else", goto:"lms-dashboard", gotoLabel:"LMS course dashboard" }
        ] },
      { action:"User clicks 'Progress'",
        conditions:[ { type:"plain", goto:"dashboard-progress", gotoLabel:"Progress view" } ] },
    ]
  },
  {
    id:"dashboard-progress", stage:"dashboard", task:16, label:"Progress view", route:"/dashboard/progress",
    purpose:"Aggregate progress + readiness summary across every enrolment.",
    inbound:[{ from:"dashboard-top", label:"'Progress' link" }],
    branches:[
      { action:"User clicks 'Back to course'",
        conditions:[ { type:"plain", goto:"lms-dashboard", gotoLabel:"LMS course dashboard" } ] },
    ]
  },
  {
    id:"dashboard-multi", stage:"dashboard", task:17, label:"Combo dashboard", route:"/dashboard-multi",
    purpose:"Combo enrolment view (e.g. PRINCE2 F+P). Two stacked sub-sections, two voucher tiles, two readiness banners.",
    inbound:[{ from:"dashboard-top", label:"Combo course tile", condition:"type=combo" }],
    branches:[
      { action:"User clicks F or P sub-section",
        conditions:[ { type:"plain", goto:"lms-dashboard", gotoLabel:"LMS course dashboard (scoped)" } ] },
    ]
  },
  {
    id:"lms-dashboard", stage:"dashboard", task:13, label:"LMS course dashboard", route:"/lms/pmp",
    purpose:"<strong>Central hub.</strong> Sections for Core training, Exam Preparation, Active Learning, and Support. Status banner, voucher tile, readiness card all live here.",
    inbound:[
      { label:"Single-enrol login" },
      { from:"onb-complete", label:"After onboarding" },
      { from:"dashboard-top", label:"Course pick" },
      { from:"voucher-scheduled", label:"After booking exam" }
    ],
    branches:[
      { action:"On load — tier check",
        conditions:[
          { type:"if", test:"tier === 'bronze'", goto:"bronze-view", gotoLabel:"Bronze locks view" },
          { type:"else", goto:null, gotoLabel:"Render full dashboard" },
        ] },
      { action:"User clicks any content tile",
        conditions:[
          { type:"plain", goto:"reference-card", gotoLabel:"Reference card" },
          { type:"plain", goto:"study-guide", gotoLabel:"Study guide" },
          { type:"plain", goto:"glossary", gotoLabel:"Glossary" },
          { type:"plain", goto:"qbank-picker", gotoLabel:"Q-bank picker" },
          { type:"plain", goto:"mock-intro", gotoLabel:"Mock paper intro" },
        ] },
      { action:"User clicks AI section card",
        conditions:[
          { type:"if", test:"tier ≥ silver", goto:"ai-section", gotoLabel:"AI section view" },
          { type:"else", goto:null, gotoLabel:"Show 'Upgrade to Silver' locked-tile modal" },
        ] },
      { action:"User clicks a Support tile",
        conditions:[
          { type:"plain", goto:"live-training", gotoLabel:"Live training schedule" },
          { type:"plain", goto:"qa-session", gotoLabel:"Q&A sessions" },
          { type:"if", test:"tier === 'gold'", goto:"coaching", gotoLabel:"1:1 coaching" },
          { type:"plain", goto:"support-inbox", gotoLabel:"Support inbox" },
          { type:"plain", goto:"community", gotoLabel:"Community" },
          { type:"plain", goto:"cashback", gotoLabel:"Cashback ledger" },
          { type:"if", test:"tier === 'gold'", goto:"money-back", gotoLabel:"Money-back guarantee" },
          { type:"plain", goto:"attendance-cert", gotoLabel:"Attendance certificate" },
        ] },
      { action:"User clicks the status banner / readiness card",
        conditions:[ { type:"plain", goto:"readiness", gotoLabel:"Readiness panel" } ] },
      { action:"User clicks the voucher tile",
        conditions:[
          { type:"if", test:"voucher.state === 'unlocked'", goto:"voucher-tile", gotoLabel:"Voucher tile (reveal flow)" },
          { type:"else", goto:"voucher-tile", gotoLabel:"Voucher tile (locked — see what's left)" },
        ] },
    ]
  },
  {
    id:"bronze-view", stage:"dashboard", task:34, tier:"bronze", label:"Bronze locks view", route:"/lms/pmp/bronze-view",
    purpose:"Bronze-tier variant — AI tiles and Coaching tiles render as locked with 'Upgrade →' CTAs.",
    inbound:[{ from:"lms-dashboard", label:"Auto-route", condition:"tier=bronze" }],
    branches:[
      { action:"User clicks any locked tile",
        conditions:[ { type:"plain", goto:null, gotoLabel:"Show tier-mismatch lock modal", note:"see Task 60" } ] },
    ]
  },

  /* ── CONTENT ──────────────────────────────────────────────── */
  {
    id:"reference-card", stage:"content", task:18, label:"Reference card", route:"/lms/pmp/reference/integration-management",
    purpose:"Card body with left card list, prev/next, mark-as-read toggle, bookmark icon.",
    inbound:[{ from:"lms-dashboard", label:"Reference Cards section" }],
    branches:[
      { action:"User clicks 'Mark as read'",
        conditions:[ { type:"plain", goto:null, gotoLabel:"Persist read state · emit progress delta" } ] },
      { action:"User clicks bookmark icon",
        conditions:[ { type:"plain", goto:null, gotoLabel:"Save · appears on /saved" } ] },
    ]
  },
  {
    id:"study-guide", stage:"content", task:19, label:"Study guide", route:"/lms/pmp/study-guide/pmbok-7",
    purpose:"Long-form chapter with sticky TOC, anchor jumps, debounced scroll-progress.",
    inbound:[{ from:"lms-dashboard", label:"Study Guides section" }],
    branches:[

/* ─── Render ───────────────────────────────────────────────── */

const pageMap = new Map(PAGES.map(p => [p.id, p]));

const root = document.getElementById("root");

STAGES.forEach(stage => {
  const stagePages = PAGES.filter(p => p.stage === stage.id);
  if (stagePages.length === 0) return;

  const section = document.createElement("section");
  section.className = "stage " + stage.id;
  section.id = stage.id;
  section.innerHTML = `
    <header>
      <h2>${stage.icon} ${stage.label}</h2>
      <small>${stage.sub} · ${stagePages.length} pages</small>
    </header>
  `;
  stagePages.forEach(p => section.appendChild(renderPage(p)));
  root.appendChild(section);
});

function renderPage(p) {
  const art = document.createElement("article");
  art.className = "page " + p.stage;
  art.id = "page-" + p.id;

  const inboundHtml = p.inbound && p.inbound.length
    ? `<div class="inbound"><strong>From:</strong>${p.inbound.map(i =>
        i.from
          ? ` <a href="#page-${i.from}">${pageMap.get(i.from)?.label ?? i.from}</a> (${i.label})`
          : ` <span>${i.label}</span>`
      ).join(" · ")}</div>`
    : "";

  const branchesHtml = (p.branches || []).map(b => {
    const condsHtml = b.conditions.map(c => {
      if (c.type === "plain") {
        return `<div class="out-row">
          ${c.goto
            ? `<a href="#page-${c.goto}">${c.gotoLabel}</a>`
            : `<span>${c.gotoLabel}</span>`}
          ${c.note ? `<span class="note">— ${c.note}</span>` : ""}
        </div>`;
      }
      const diamondClass = c.type === "else" ? "else" : (c.type === "success" ? "success" : "");
      const testText = c.type === "else" ? "else" : (c.test ?? "");
      return `<div class="cond">
        <span class="diamond ${diamondClass}"></span>
        <span class="test ${diamondClass}">${testText}</span>
        <span class="goto">
          ${c.goto
            ? `<a href="#page-${c.goto}">${c.gotoLabel}</a>`
            : c.gotoLabel}
          ${c.note ? `<span class="note">— ${c.note}</span>` : ""}
        </span>
      </div>`;
    }).join("");

    return `<div class="branch">
      <div class="branch-action">${b.action}</div>
      ${b.conditions.some(c => c.type !== "plain")
        ? `<div class="conditions">${condsHtml}</div>`
        : condsHtml}
    </div>`;
  }).join("");

  art.innerHTML = `
    <header class="page-head">
      <h3>
        <span class="icon">${STAGES.find(s => s.id === p.stage).icon}</span>
        ${p.label}
      </h3>
      <div class="meta">
        <a href="${HOST}${p.route}" target="_blank">${p.route}</a>
        <span class="task-pill">T${p.task}</span>
        ${p.tier ? `<span class="tier-pill ${p.tier}">${p.tier.toUpperCase()}</span>` : ""}
      </div>
    </header>
    <p class="purpose">${p.purpose}</p>
    ${inboundHtml}
    ${branchesHtml ? `<div class="branch-label">If / else flow</div><div class="branches">${branchesHtml}</div>` : ""}
  `;

  return art;
}
